name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR/branch when a new push lands.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Required at build/runtime by lib/supabase/{client,server}.ts and the
      # seed/cleanup scripts. Set these as repository secrets.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # Platform admin spec (07) skips itself unless both are set.
      PLATFORM_ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}
      PLATFORM_ADMIN_PASSWORD: ${{ secrets.PLATFORM_ADMIN_PASSWORD }}
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      # The webServer block in playwright.config.ts boots `npm run dev`. The
      # config also reads .env.local — synthesize one from the env vars set
      # at the job level so the dev server + seed scripts pick them up.
      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          GROQ_API_KEY=${GROQ_API_KEY}
          RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
          RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Run Playwright suite
        run: npm run test:e2e -- --reporter=list --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 14

      - name: Cleanup test rows
        if: always()
        run: npm run test:e2e:cleanup || true
